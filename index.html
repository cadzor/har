<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAR Analyzer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d1117;
  --bg2:      #161b22;
  --bg3:      #1e242e;
  --bg4:      #252d3a;
  --border:   #2a3040;
  --border2:  #3a4458;
  --text:     #e1e6f0;
  --text-dim: #7b849e;
  --text-muted: #404860;
  --accent:   #4f80ff;
  --accent2:  #3366dd;
  --green:    #3dd68c;
  --blue:     #38bdf8;
  --orange:   #fb923c;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --purple:   #c084fc;
  --pink:     #f472b6;
  --mono: 'Consolas', 'Cascadia Code', 'Monaco', 'Courier New', monospace;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ── */
.app-header {
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.app-header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.app-header .subtitle { font-size: 12px; color: var(--text-dim); margin-left: 4px; }
.header-badge {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
}

/* ── Upload Screen ── */
#uploadScreen {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
}
.drop-zone {
  width: 100%;
  max-width: 560px;
  border: 2px dashed var(--border2);
  border-radius: 14px;
  padding: 56px 40px;
  text-align: center;
  cursor: pointer;
  background: var(--bg2);
  transition: border-color 0.18s, background 0.18s;
  user-select: none;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(79,128,255,0.06);
}
.drop-zone .dz-icon { font-size: 52px; display: block; margin-bottom: 14px; }
.drop-zone h2 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
.drop-zone .dz-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 22px; }
.drop-zone .dz-privacy { margin-top: 18px; font-size: 11px; color: var(--text-muted); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: 6px; border: none;
  cursor: pointer; font-size: 13px; font-weight: 500;
  transition: background 0.15s, opacity 0.15s;
  white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-ghost {
  background: var(--bg3); color: var(--text);
  border: 1px solid var(--border2);
}
.btn-ghost:hover { background: var(--bg4); }

/* ── Main App Layout ── */
#appScreen { flex: 1; display: none; flex-direction: column; overflow: hidden; }
#appScreen.visible { display: flex; }

/* ── Summary Bar ── */
.summary-bar {
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 28px;
  flex-wrap: wrap;
}
.stat { display: flex; flex-direction: column; gap: 1px; }
.stat-val { font-size: 18px; font-weight: 700; line-height: 1.2; font-family: var(--mono); }
.stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); }
.summary-file {
  margin-left: auto;
  display: flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── Parse Warnings ── */
.parse-warnings {
  flex-shrink: 0;
  background: rgba(251,191,36,0.07);
  border-bottom: 1px solid rgba(251,191,36,0.25);
  padding: 5px 20px;
  font-size: 11px; color: var(--yellow);
  display: none;
}

/* ── Toolbar ── */
.toolbar {
  flex-shrink: 0;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex; align-items: center; gap: 10px;
}
.tab-group {
  display: flex;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 3px;
  gap: 2px;
}
.tab-btn {
  padding: 5px 13px; border-radius: 5px; border: none;
  background: none; color: var(--text-dim);
  cursor: pointer; font-size: 12px; font-weight: 500;
  transition: all 0.15s;
}
.tab-btn.active { background: var(--accent); color: #fff; }
.tab-btn:hover:not(.active) { color: var(--text); background: var(--bg4); }

.search-wrap {
  flex: 1; max-width: 380px; position: relative;
}
.search-wrap svg {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); pointer-events: none; width: 13px; height: 13px;
}
.search-wrap input {
  width: 100%; padding: 6px 10px 6px 29px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-size: 12px; outline: none;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-muted); }

.filter-info { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

/* ── Content Area ── */
.content-area { flex: 1; overflow-y: auto; overflow-x: hidden; }

/* ─────────── Scrollbar ─────────── */
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Request Table ── */
.req-table {
  width: 100%; border-collapse: collapse; table-layout: fixed;
}
.req-table thead th {
  position: sticky; top: 0; z-index: 5;
  background: var(--bg2);
  padding: 7px 10px;
  text-align: left;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--text-dim); font-weight: 600;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.req-table th:last-child { border-right: none; }

.req-table tr.req-row {
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.08s;
}
.req-table tr.req-row:hover { background: var(--bg2); }
.req-table tr.req-row.expanded { background: var(--bg3); }

.req-table td {
  padding: 7px 10px;
  vertical-align: middle;
  overflow: hidden;
}

/* column widths */
.col-num    { width: 40px; }
.col-status { width: 58px; }
.col-method { width: 64px; }
.col-url    { /* flex */ }
.col-type   { width: 110px; }
.col-size   { width: 68px; text-align: right; }
.col-time   { width: 72px; text-align: right; }
.col-wf     { width: 180px; }

/* ── Badges ── */
.status-badge {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 6px; border-radius: 4px;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  min-width: 38px;
}
.s2xx { background: rgba(61,214,140,0.13); color: var(--green); }
.s3xx { background: rgba(56,189,248,0.13); color: var(--blue); }
.s4xx { background: rgba(251,146,60,0.13); color: var(--orange); }
.s5xx { background: rgba(248,113,113,0.13); color: var(--red); }
.s0   { background: rgba(120,132,160,0.13); color: var(--text-dim); }

.method-badge {
  display: inline-block; font-family: var(--mono); font-size: 11px; font-weight: 700;
}
.mGET     { color: var(--green); }
.mPOST    { color: var(--blue); }
.mPUT     { color: var(--orange); }
.mDELETE  { color: var(--red); }
.mPATCH   { color: var(--purple); }
.mOPTIONS { color: var(--text-dim); }
.mHEAD    { color: var(--text-dim); }
.mOTHER   { color: var(--text-dim); }

.url-text {
  font-family: var(--mono); font-size: 11px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: block;
}
.type-text {
  font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
}
.num-text {
  font-family: var(--mono); font-size: 11px;
  display: block; text-align: right;
}
.row-num { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

/* ── Waterfall ── */
.wf-track {
  background: var(--bg3);
  border-radius: 2px; height: 14px;
  position: relative; overflow: hidden;
}
.wf-bar {
  position: absolute; height: 100%; border-radius: 2px; min-width: 2px;
}
.wf-ok     { background: var(--green);    opacity: 0.65; }
.wf-redir  { background: var(--blue);     opacity: 0.65; }
.wf-warn   { background: var(--orange);   opacity: 0.65; }
.wf-err    { background: var(--red);      opacity: 0.65; }
.wf-other  { background: var(--text-dim); opacity: 0.45; }

/* ── Detail Panel ── */
.detail-row td { padding: 0; }
.detail-panel {
  background: var(--bg3);
  border-bottom: 2px solid var(--accent);
  padding: 14px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 900px) {
  .detail-panel { grid-template-columns: 1fr; }
}
.dp-section { display: flex; flex-direction: column; gap: 7px; }
.dp-section h4 {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px;
  color: var(--text-dim); padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}
.kv-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 10px; }
.kv-key {
  font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  white-space: nowrap; align-self: start; padding-top: 1px;
}
.kv-val {
  font-family: var(--mono); font-size: 11px; color: var(--text);
  word-break: break-all; align-self: start;
}
.dp-empty { font-size: 11px; color: var(--text-muted); font-style: italic; }

/* ── Timing bars ── */
.timing-rows { display: flex; flex-direction: column; gap: 5px; }
.t-row { display: grid; grid-template-columns: 72px 1fr 56px; gap: 7px; align-items: center; }
.t-label { font-size: 11px; color: var(--text-dim); }
.t-track { background: var(--bg2); border-radius: 2px; height: 7px; overflow: hidden; }
.t-fill  { height: 100%; border-radius: 2px; }
.t-val   { font-family: var(--mono); font-size: 11px; text-align: right; }

/* ── Empty / No-match ── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.empty-state .es-icon { font-size: 38px; display: block; margin-bottom: 12px; }
.empty-state h3 { font-size: 15px; margin-bottom: 6px; color: var(--text); }
.empty-state p  { font-size: 13px; }

/* ── Troubleshoot View ── */
.trouble-wrap { padding: 16px 20px; }
.sev-group { margin-bottom: 20px; }
.sev-header {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; border-radius: 8px; margin-bottom: 8px;
  cursor: pointer; user-select: none;
}
.sev-header.sev-error   { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); }
.sev-header.sev-warning { background: rgba(251,146,60,0.08);  border: 1px solid rgba(251,146,60,0.25); }
.sev-header.sev-info    { background: rgba(251,191,36,0.08);  border: 1px solid rgba(251,191,36,0.25); }
.sev-title { font-weight: 600; font-size: 13px; }
.sev-count {
  font-size: 11px; color: var(--text-dim);
  background: var(--bg3); padding: 1px 8px; border-radius: 10px;
}
.sev-chevron { margin-left: auto; color: var(--text-dim); transition: transform 0.2s; }
.sev-header.collapsed .sev-chevron { transform: rotate(-90deg); }

.issue-list { display: flex; flex-direction: column; gap: 5px; }
.issue-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 7px; overflow: hidden; cursor: pointer;
  transition: border-color 0.15s;
}
.issue-card:hover { border-color: var(--border2); }
.issue-card.expanded { border-color: var(--accent); }

.issue-main {
  padding: 9px 13px;
  display: grid;
  grid-template-columns: 46px 52px 1fr auto auto;
  gap: 8px; align-items: center;
}
.issue-explain {
  background: var(--bg3); border-top: 1px solid var(--border);
  padding: 10px 14px; display: none;
}
.issue-card.expanded .issue-explain { display: block; }
.reason-line {
  font-size: 12px; color: var(--text-dim); line-height: 1.6;
  padding: 3px 0;
  display: flex; gap: 7px;
}
.reason-line + .reason-line { border-top: 1px solid var(--border); margin-top: 3px; padding-top: 6px; }

/* detail panel inside issue card — override bg */
.issue-explain .detail-panel {
  background: var(--bg4); margin-top: 10px; border-radius: 6px;
  border-bottom: none; border: 1px solid var(--border);
}

/* ── Misc ── */
.dim { color: var(--text-dim); }
.muted { color: var(--text-muted); }
.mono { font-family: var(--mono); }
.nowrap { white-space: nowrap; }
</style>
</head>
<body>

<!-- ─── Header ─────────────────────────────────────────── -->
<header class="app-header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4f80ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
  </svg>
  <h1>HAR Analyzer</h1>
  <span class="subtitle">HTTP Archive Inspector</span>
  <span class="header-badge">client-side only &mdash; nothing uploaded</span>
</header>

<!-- ─── Upload Screen ───────────────────────────────────── -->
<div id="uploadScreen">
  <div class="drop-zone" id="dropZone">
    <span class="dz-icon">🗂️</span>
    <h2>Drop a HAR file here</h2>
    <p class="dz-sub">Supports .har files from Chrome DevTools, Firefox Network tab, Fiddler, Charles, or any HAR-compatible tool</p>
    <button class="btn btn-primary" id="filePickerBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Choose File
    </button>
    <input type="file" id="fileInput" accept=".har,application/json" style="display:none">
    <p class="dz-privacy">🔒 All processing happens in your browser. No data leaves your machine.</p>
  </div>
</div>

<!-- ─── App Screen (shown after load) ──────────────────── -->
<div id="appScreen">

  <!-- Summary Bar -->
  <div class="summary-bar" id="summaryBar"></div>

  <!-- Parse Warnings -->
  <div class="parse-warnings" id="parseWarnings"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="tab-group">
      <button class="tab-btn active" id="tabChrono"   onclick="switchView('chrono')">⏱ Chronological</button>
      <button class="tab-btn"        id="tabTrouble"  onclick="switchView('trouble')">🔍 Troubleshoot</button>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Filter by URL, status, method, or type…" oninput="applyFilter()">
    </div>
    <span class="filter-info" id="filterInfo"></span>
    <button class="btn btn-ghost" onclick="loadNewFile()" style="margin-left:auto">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      Load New File
    </button>
  </div>

  <!-- Content -->
  <div class="content-area" id="contentArea">
    <div id="chronoView"></div>
    <div id="troubleView" style="display:none"></div>
  </div>

</div><!-- #appScreen -->

<script>
// ═══════════════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════════════
let entries       = [];
let analyzedIssues = [];
let parseWarnings = [];
let currentView   = 'chrono';
let filterQuery   = '';
let harStart      = 0;
let totalDuration = 0;

// ═══════════════════════════════════════════════════════════════
//  File Handling
// ═══════════════════════════════════════════════════════════════
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

document.getElementById('filePickerBtn').onclick = () => fileInput.click();
fileInput.onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

function loadNewFile() {
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('uploadScreen').style.display = 'flex';
  entries = []; analyzedIssues = []; parseWarnings = [];
  filterQuery = '';
  document.getElementById('searchInput').value = '';
  fileInput.value = '';
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const json = JSON.parse(e.target.result);
      parseHAR(json, file.name);
    } catch (err) {
      alert('Could not parse file as JSON:\n' + err.message);
    }
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════════════════════
//  HAR Parsing
// ═══════════════════════════════════════════════════════════════
function parseHAR(json, filename) {
  parseWarnings = [];
  entries = [];

  if (!json.log) { alert('Invalid HAR: missing "log" key.'); return; }
  const log = json.log;
  if (!Array.isArray(log.entries)) { alert('Invalid HAR: missing entries array.'); return; }

  log.entries.forEach((raw, i) => {
    try {
      const req      = raw.request  || {};
      const res      = raw.response || {};
      const timings  = raw.timings  || {};
      const started  = raw.startedDateTime ? new Date(raw.startedDateTime).getTime() : null;
      const duration = typeof raw.time === 'number' ? raw.time : -1;

      // Size: prefer bodySize, fallback to content-length header
      let size = (res.bodySize > 0) ? res.bodySize : 0;
      if (!size) {
        const cl = hdr(res.headers, 'content-length');
        if (cl) size = parseInt(cl, 10) || 0;
      }

      const contentType = hdr(res.headers, 'content-type') || '';
      const mimeType    = contentType.split(';')[0].trim();

      entries.push({
        index:       i,
        startTime:   started,
        duration,
        url:         req.url    || '',
        method:      (req.method || 'GET').toUpperCase(),
        status:      typeof res.status === 'number' ? res.status : 0,
        size,
        mimeType,
        contentType,
        timings,
        reqHeaders:  req.headers      || [],
        resHeaders:  res.headers      || [],
        queryParams: req.queryString  || [],
        _error:      raw._error || res._error || null,
      });
    } catch (err) {
      parseWarnings.push(`Entry #${i}: ${err.message}`);
    }
  });

  // Time range
  const valid = entries.filter(e => e.startTime !== null && e.duration >= 0);
  if (valid.length) {
    harStart      = Math.min(...valid.map(e => e.startTime));
    const harEnd  = Math.max(...valid.map(e => e.startTime + e.duration));
    totalDuration = harEnd - harStart;
  }

  analyzedIssues = analyzeIssues();
  renderSummary(log, filename);
  renderChronological();
  renderTroubleshoot();

  // Parse warnings
  const pwEl = document.getElementById('parseWarnings');
  if (parseWarnings.length) {
    pwEl.style.display = 'block';
    pwEl.textContent   = `⚠ ${parseWarnings.length} entr${parseWarnings.length === 1 ? 'y' : 'ies'} had parse issues (skipped): ` +
      parseWarnings.slice(0, 3).join(' | ') + (parseWarnings.length > 3 ? ' …' : '');
  } else {
    pwEl.style.display = 'none';
  }

  document.getElementById('uploadScreen').style.display = 'none';
  document.getElementById('appScreen').classList.add('visible');
  switchView('chrono');
}

function hdr(headers, name) {
  if (!Array.isArray(headers)) return null;
  const h = headers.find(h => h.name && h.name.toLowerCase() === name.toLowerCase());
  return h ? h.value : null;
}

// ═══════════════════════════════════════════════════════════════
//  Summary Bar
// ═══════════════════════════════════════════════════════════════
function renderSummary(log, filename) {
  const totalSize  = entries.reduce((s, e) => s + (e.size || 0), 0);
  const pages      = log.pages ? log.pages.length : 0;
  const issues     = entries.filter(e => e.status >= 400 || e.status === 0).length;

  document.getElementById('summaryBar').innerHTML = `
    <div class="stat"><div class="stat-val">${entries.length}</div><div class="stat-lbl">Requests</div></div>
    <div class="stat"><div class="stat-val">${fmtSize(totalSize)}</div><div class="stat-lbl">Total Size</div></div>
    <div class="stat"><div class="stat-val">${totalDuration > 0 ? fmtMs(totalDuration) : '—'}</div><div class="stat-lbl">Duration</div></div>
    <div class="stat"><div class="stat-val">${pages || '—'}</div><div class="stat-lbl">Pages</div></div>
    <div class="stat"><div class="stat-val" style="color:${issues > 0 ? 'var(--orange)' : 'var(--green)'}">${issues}</div><div class="stat-lbl">4xx/5xx/Failed</div></div>
    <div class="summary-file">📄 ${esc(filename)}</div>
  `;
}

// ═══════════════════════════════════════════════════════════════
//  Chronological View
// ═══════════════════════════════════════════════════════════════
function renderChronological() {
  document.getElementById('chronoView').innerHTML = `
    <table class="req-table" id="chronoTable">
      <thead><tr>
        <th class="col-num">#</th>
        <th class="col-status">Status</th>
        <th class="col-method">Method</th>
        <th class="col-url">URL</th>
        <th class="col-type">Type</th>
        <th class="col-size">Size</th>
        <th class="col-time">Time</th>
        <th class="col-wf">Waterfall</th>
      </tr></thead>
      <tbody id="chronoBody"></tbody>
    </table>`;
  renderChronoRows();
}

function renderChronoRows() {
  const tbody    = document.getElementById('chronoBody');
  if (!tbody) return;
  const filtered = filteredEntries();
  updateFilterInfo(filtered.length);

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state">
      <span class="es-icon">🔎</span><h3>No matching requests</h3><p>Try a different filter.</p>
    </div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(e => buildChronoRow(e)).join('');
}

function buildChronoRow(e) {
  const sc = statusClass(e.status);
  const sd = e.status > 0 ? e.status : (e._error ? 'ERR' : '—');
  const mc = 'm' + (e.method in {GET:1,POST:1,PUT:1,DELETE:1,PATCH:1,OPTIONS:1,HEAD:1} ? e.method : 'OTHER');

  // Waterfall
  let wfHtml = '';
  if (e.startTime !== null && totalDuration > 0) {
    const left = ((e.startTime - harStart) / totalDuration * 100).toFixed(3);
    const w    = Math.max((Math.max(e.duration, 0) / totalDuration * 100), 0.2).toFixed(3);
    const cls  = e.status >= 500 ? 'wf-err' : e.status >= 400 ? 'wf-warn' :
                 e.status >= 300 ? 'wf-redir' : e.status >= 200 ? 'wf-ok' : 'wf-other';
    wfHtml = `<div class="wf-track">
      <div class="wf-bar ${cls}" style="left:${left}%;width:${w}%"
           title="Start: +${fmtMs(e.startTime - harStart)}  Duration: ${fmtMs(e.duration)}"></div>
    </div>`;
  }

  const urlShort = truncUrl(e.url, 90);
  const typeShort = e.mimeType.replace(/^(application|text)\//,'').split('/')[0] || e.mimeType;

  return `
    <tr class="req-row" data-idx="${e.index}" onclick="toggleDetail(${e.index}, this)">
      <td class="col-num"><span class="row-num">${e.index + 1}</span></td>
      <td class="col-status"><span class="status-badge ${sc}">${sd}</span></td>
      <td class="col-method"><span class="method-badge ${mc}">${esc(e.method)}</span></td>
      <td class="col-url"><span class="url-text" title="${esc(e.url)}">${esc(urlShort)}</span></td>
      <td class="col-type"><span class="type-text" title="${esc(e.mimeType)}">${esc(typeShort)}</span></td>
      <td class="col-size"><span class="num-text dim">${e.size > 0 ? fmtSize(e.size) : '—'}</span></td>
      <td class="col-time"><span class="num-text" style="color:${e.duration > 2000 ? 'var(--orange)' : e.duration > 500 ? 'var(--yellow)' : 'inherit'}">${e.duration >= 0 ? e.duration.toFixed(0) + 'ms' : '—'}</span></td>
      <td class="col-wf">${wfHtml}</td>
    </tr>`;
}

function toggleDetail(idx, rowEl) {
  const existId = 'dp-' + idx;
  const exist   = document.getElementById(existId);
  if (exist) {
    exist.remove();
    rowEl.classList.remove('expanded');
    return;
  }
  // Close others
  document.querySelectorAll('.detail-row').forEach(r => r.remove());
  document.querySelectorAll('.req-row.expanded').forEach(r => r.classList.remove('expanded'));

  rowEl.classList.add('expanded');
  const e = entries[idx];
  const tr = document.createElement('tr');
  tr.className  = 'detail-row';
  tr.id         = existId;
  const td = document.createElement('td');
  td.setAttribute('colspan', '8');
  td.innerHTML = buildDetailPanel(e);
  tr.appendChild(td);
  rowEl.after(tr);
}

// ═══════════════════════════════════════════════════════════════
//  Detail Panel (shared by chrono + issues)
// ═══════════════════════════════════════════════════════════════
function buildDetailPanel(e) {
  const reqH = kvRows(e.reqHeaders.slice(0, 40));
  const resH = kvRows(e.resHeaders.slice(0, 40));
  const qp   = e.queryParams.length
    ? kvRows(e.queryParams.slice(0, 30))
    : '<div class="dp-empty">None</div>';

  // Timing — HAR uses -1 for "not applicable"
  const t = e.timings;
  const phases = [
    { label: 'Blocked', val: t.blocked, color: '#9ca3af' },
    { label: 'DNS',     val: t.dns,     color: '#c084fc' },
    { label: 'Connect', val: t.connect, color: '#60a5fa' },
    { label: 'SSL',     val: t.ssl,     color: '#34d399' },
    { label: 'Send',    val: t.send,    color: '#fbbf24' },
    { label: 'Wait',    val: t.wait,    color: '#f87171' },
    { label: 'Receive', val: t.receive, color: '#4ade80' },
  ].filter(p => typeof p.val === 'number' && p.val >= 0);

  const tTotal = phases.reduce((s, p) => s + p.val, 0) || Math.max(e.duration, 1);
  const timingHtml = phases.length
    ? `<div class="timing-rows">${phases.map(p => {
        const pct = Math.max((p.val / tTotal) * 100, 1).toFixed(1);
        return `<div class="t-row">
          <div class="t-label">${p.label}</div>
          <div class="t-track"><div class="t-fill" style="width:${pct}%;background:${p.color}"></div></div>
          <div class="t-val" style="color:${p.color}">${p.val.toFixed(1)}ms</div>
        </div>`;
      }).join('')}</div>`
    : '<div class="dp-empty">No timing data</div>';

  const totalLbl = e.duration >= 0 ? `${e.duration.toFixed(1)} ms total` : '—';

  return `<div class="detail-panel">
    <div class="dp-section"><h4>Request Headers</h4><div class="kv-grid">${reqH || '<div class="dp-empty">None</div>'}</div></div>
    <div class="dp-section"><h4>Response Headers</h4><div class="kv-grid">${resH || '<div class="dp-empty">None</div>'}</div></div>
    <div class="dp-section"><h4>Query Parameters</h4><div class="kv-grid">${qp}</div></div>
    <div class="dp-section"><h4>Timing Breakdown — ${totalLbl}</h4>${timingHtml}</div>
  </div>`;
}

function kvRows(arr) {
  if (!arr || !arr.length) return '';
  return arr.map(item =>
    `<div class="kv-key">${esc(item.name)}</div><div class="kv-val">${esc(item.value)}</div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════════════
//  Issue Analysis
// ═══════════════════════════════════════════════════════════════
function analyzeIssues() {
  // Count URL bases for duplicate detection
  const urlCounts = {};
  entries.forEach(e => {
    const base = baseUrl(e.url);
    urlCounts[base] = (urlCounts[base] || 0) + 1;
  });

  const issues = [];

  entries.forEach(e => {
    const reasons = [];
    let severity  = null;

    const setSev = (s) => {
      const order = { error: 0, warning: 1, info: 2 };
      if (severity === null || order[s] < order[severity]) severity = s;
    };

    // ── ERRORS ────────────────────────────────────────────────
    if (e.status >= 500) {
      reasons.push(`Server error ${e.status}: The server returned an internal error. Check server logs for stack traces or configuration problems.`);
      setSev('error');
    }
    if (e.status === 0 || e._error) {
      reasons.push('Request failed or was aborted before a response was received. Possible causes: network failure, DNS resolution error, connection refused, or the request was cancelled by the browser.');
      setSev('error');
    }
    // CORS: origin header present, request failed (status 0), no ACAO header
    const acao      = hdr(e.resHeaders, 'access-control-allow-origin');
    const reqOrigin = hdr(e.reqHeaders, 'origin');
    if (reqOrigin && e.status === 0 && !acao) {
      reasons.push(`Likely CORS block: The request included an Origin header (${reqOrigin}) but the response lacked Access-Control-Allow-Origin. The browser silently blocked the response.`);
      setSev('error');
    }

    // ── WARNINGS ──────────────────────────────────────────────
    if (e.status >= 400 && e.status < 500) {
      const msgs = {
        400: '400 Bad Request: The server could not understand the request. Check the request body, parameters, and Content-Type header.',
        401: '401 Unauthorized: Authentication required. The client must provide valid credentials (e.g., Authorization header or login cookie).',
        403: '403 Forbidden: The server refused to fulfill the request. The authenticated user may lack permission, or IP/referrer restrictions may apply.',
        404: '404 Not Found: The resource does not exist at this URL. Check for typos, deleted resources, or misconfigured routes.',
        405: '405 Method Not Allowed: The HTTP method used is not supported for this endpoint.',
        408: '408 Request Timeout: The server timed out waiting for the complete request.',
        409: '409 Conflict: The request conflicts with the current state of the server (e.g., duplicate unique key).',
        410: '410 Gone: The resource has been permanently removed.',
        422: '422 Unprocessable Entity: The request was well-formed but failed validation. Review the request body.',
        429: '429 Too Many Requests: The server is rate-limiting this client. Back off and retry after the Retry-After header delay.',
      };
      reasons.push(msgs[e.status] || `${e.status} Client Error: The server rejected this request. Review the request parameters, headers, and body.`);
      setSev('warning');
    }

    if (e.duration > 2000 && e.duration >= 0) {
      reasons.push(`Slow request (${e.duration.toFixed(0)} ms): Anything over 2 seconds can cause noticeable latency for users. Check the timing breakdown for where time is spent (DNS, connect, TTFB, download).`);
      setSev('warning');
    }

    // Large uncompressed response
    const encoding = hdr(e.resHeaders, 'content-encoding');
    if (e.size > 1024 * 1024 && !encoding) {
      reasons.push(`Large uncompressed response (${fmtSize(e.size)}): No Content-Encoding header found. Enable gzip or brotli compression on the server to significantly reduce transfer size.`);
      setSev('warning');
    }

    // Missing cache headers on static assets
    const staticAsset = /\.(js|css|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|otf|ico|eot)(\?|$)/i.test(e.url);
    if (staticAsset && e.status === 200) {
      const cc  = hdr(e.resHeaders, 'cache-control');
      const exp = hdr(e.resHeaders, 'expires');
      if (!cc && !exp) {
        reasons.push('Missing cache headers on a static asset: No Cache-Control or Expires header found. Browsers will re-fetch this resource on every page load. Add Cache-Control: max-age=31536000, immutable for versioned assets.');
        setSev('warning');
      }
    }

    // ── INFO ──────────────────────────────────────────────────
    if (e.status >= 300 && e.status < 400) {
      const loc = hdr(e.resHeaders, 'location') || '(unknown destination)';
      reasons.push(`Redirect ${e.status}: This request is redirected to ${loc}. Each redirect adds a full round-trip of latency. Update references to point directly to the final URL where possible.`);
      setSev('info');
    }

    // Duplicate URL
    const base = baseUrl(e.url);
    if (urlCounts[base] > 1) {
      reasons.push(`Duplicate request (${urlCounts[base]}× same URL base): ${base} — Consider deduplicating calls with request caching, SWR patterns, or moving shared fetches to a shared state layer.`);
      setSev('info');
    }

    // Explicit no-cache on non-static resources that seem cacheable
    const ccVal = hdr(e.resHeaders, 'cache-control') || '';
    if ((ccVal.includes('no-cache') || ccVal.includes('no-store')) && !staticAsset && e.status === 200) {
      reasons.push(`Explicit no-cache (${ccVal}): The server is preventing caching for this resource. If the data changes infrequently, consider using stale-while-revalidate or a short max-age to reduce redundant network round-trips.`);
      setSev('info');
    }

    if (severity) issues.push({ entry: e, severity, reasons });
  });

  // Sort: severity order, then within each group by slowest+largest first
  const sevOrder = { error: 0, warning: 1, info: 2 };
  issues.sort((a, b) => {
    if (sevOrder[a.severity] !== sevOrder[b.severity])
      return sevOrder[a.severity] - sevOrder[b.severity];
    const scoreA = (a.entry.duration > 0 ? a.entry.duration : 0) + a.entry.size / 1000;
    const scoreB = (b.entry.duration > 0 ? b.entry.duration : 0) + b.entry.size / 1000;
    return scoreB - scoreA;
  });

  return issues;
}

// ═══════════════════════════════════════════════════════════════
//  Troubleshoot Render
// ═══════════════════════════════════════════════════════════════
function renderTroubleshoot() {
  const container = document.getElementById('troubleView');
  const query     = filterQuery;

  const visibleIssues = query
    ? analyzedIssues.filter(iss =>
        iss.entry.url.toLowerCase().includes(query) ||
        String(iss.entry.status).includes(query) ||
        iss.entry.method.toLowerCase().includes(query) ||
        iss.entry.mimeType.toLowerCase().includes(query))
    : analyzedIssues;

  if (!analyzedIssues.length) {
    container.innerHTML = `<div class="empty-state">
      <span class="es-icon">✅</span><h3>No issues detected</h3>
      <p>All requests look healthy — no errors, warnings, or notable patterns found.</p>
    </div>`;
    return;
  }

  if (!visibleIssues.length) {
    container.innerHTML = `<div class="empty-state">
      <span class="es-icon">🔎</span><h3>No matching issues</h3><p>Try a different filter.</p>
    </div>`;
    return;
  }

  const groups = {
    error:   { emoji: '🔴', label: 'Errors',   items: [] },
    warning: { emoji: '🟠', label: 'Warnings', items: [] },
    info:    { emoji: '🟡', label: 'Info',      items: [] },
  };
  visibleIssues.forEach(iss => groups[iss.severity].items.push(iss));

  let html = '<div class="trouble-wrap">';
  for (const [sev, g] of Object.entries(groups)) {
    if (!g.items.length) continue;
    html += buildSevGroup(sev, g.emoji, g.label, g.items);
  }
  html += '</div>';
  container.innerHTML = html;

  updateFilterInfo(null, visibleIssues.length);
}

function buildSevGroup(sev, emoji, label, items) {
  const cardsHtml = items.map((iss, i) => buildIssueCard(iss, sev, i)).join('');
  return `
    <div class="sev-group">
      <div class="sev-header sev-${sev}" onclick="toggleSevGroup(this)">
        <span class="sev-title">${emoji} ${label}</span>
        <span class="sev-count">${items.length} issue${items.length !== 1 ? 's' : ''}</span>
        <svg class="sev-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="issue-list">${cardsHtml}</div>
    </div>`;
}

function buildIssueCard(iss, sev, idx) {
  const e  = iss.entry;
  const sc = statusClass(e.status);
  const sd = e.status > 0 ? e.status : (e._error ? 'ERR' : '—');
  const mc = 'm' + (e.method in {GET:1,POST:1,PUT:1,DELETE:1,PATCH:1,OPTIONS:1,HEAD:1} ? e.method : 'OTHER');
  const id = `ic-${sev}-${idx}`;
  const urlShort = truncUrl(e.url, 100);

  const reasonsHtml = iss.reasons.map(r =>
    `<div class="reason-line"><span>💡</span><span>${esc(r)}</span></div>`
  ).join('');

  return `
    <div class="issue-card" id="${id}" onclick="toggleIssueCard('${id}')">
      <div class="issue-main">
        <span class="status-badge ${sc}">${sd}</span>
        <span class="method-badge ${mc}">${esc(e.method)}</span>
        <span class="url-text" title="${esc(e.url)}" style="font-size:11px">${esc(urlShort)}</span>
        <span class="num-text dim nowrap" style="font-size:11px">${e.size > 0 ? fmtSize(e.size) : ''}</span>
        <span class="num-text nowrap" style="font-size:11px;color:${e.duration > 2000 ? 'var(--orange)' : 'var(--text-dim)'}">${e.duration >= 0 ? e.duration.toFixed(0) + 'ms' : '—'}</span>
      </div>
      <div class="issue-explain">
        ${reasonsHtml}
        ${buildDetailPanel(e)}
      </div>
    </div>`;
}

function toggleIssueCard(id) {
  const card = document.getElementById(id);
  card.classList.toggle('expanded');
}

function toggleSevGroup(headerEl) {
  const list    = headerEl.nextElementSibling;
  const chevron = headerEl.querySelector('.sev-chevron');
  const open    = list.style.display !== 'none';
  list.style.display          = open ? 'none' : '';
  chevron.style.transform     = open ? 'rotate(-90deg)' : '';
  headerEl.classList.toggle('collapsed', open);
}

// ═══════════════════════════════════════════════════════════════
//  Filter
// ═══════════════════════════════════════════════════════════════
function applyFilter() {
  filterQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  if (currentView === 'chrono') {
    renderChronoRows();
  } else {
    renderTroubleshoot();
  }
}

function filteredEntries() {
  if (!filterQuery) return entries;
  return entries.filter(e =>
    e.url.toLowerCase().includes(filterQuery) ||
    String(e.status).includes(filterQuery) ||
    e.method.toLowerCase().includes(filterQuery) ||
    e.mimeType.toLowerCase().includes(filterQuery)
  );
}

function updateFilterInfo(count, issueCount) {
  const el = document.getElementById('filterInfo');
  if (currentView === 'chrono') {
    el.textContent = count === entries.length
      ? `${entries.length} requests`
      : `${count} / ${entries.length} requests`;
  } else {
    el.textContent = issueCount !== null
      ? `${issueCount} / ${analyzedIssues.length} issues`
      : `${analyzedIssues.length} issues`;
  }
}

// ═══════════════════════════════════════════════════════════════
//  View Switching
// ═══════════════════════════════════════════════════════════════
function switchView(view) {
  currentView = view;
  document.getElementById('chronoView').style.display  = view === 'chrono'   ? '' : 'none';
  document.getElementById('troubleView').style.display = view === 'trouble'  ? '' : 'none';
  document.getElementById('tabChrono').classList.toggle('active',  view === 'chrono');
  document.getElementById('tabTrouble').classList.toggle('active', view === 'trouble');
  applyFilter();
}

// ═══════════════════════════════════════════════════════════════
//  Utility helpers
// ═══════════════════════════════════════════════════════════════
function statusClass(s) {
  if (s >= 500) return 's5xx';
  if (s >= 400) return 's4xx';
  if (s >= 300) return 's3xx';
  if (s >= 200) return 's2xx';
  return 's0';
}

function fmtSize(b) {
  if (!b || b <= 0) return '—';
  if (b < 1024)         return b + ' B';
  if (b < 1024 * 1024)  return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(2) + ' MB';
}

function fmtMs(ms) {
  if (ms < 0)    return '—';
  if (ms < 1000) return ms.toFixed(0) + 'ms';
  return (ms / 1000).toFixed(2) + 's';
}

function truncUrl(url, maxLen) {
  if (!url || url.length <= maxLen) return url;
  try {
    const u    = new URL(url);
    const base = u.origin + u.pathname;
    if (base.length <= maxLen) return base + (u.search ? '?…' : '');
    const parts = u.pathname.split('/');
    const leaf  = parts[parts.length - 1] || '';
    const trunc = leaf.length > 40 ? leaf.slice(0, 40) + '…' : leaf;
    return u.origin + '/…/' + trunc + (u.search ? '?…' : '');
  } catch {
    return url.slice(0, maxLen) + '…';
  }
}

function baseUrl(url) {
  try { return new URL(url).origin + new URL(url).pathname; }
  catch { return url.split('?')[0]; }
}

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
